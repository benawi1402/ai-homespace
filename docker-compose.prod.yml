version: '3.9'

# NAS deployment file — no git or build tools required on the NAS.
# Images are built by GitHub Actions and stored in GitHub Container Registry.
#
# First deploy:
#   docker compose -f docker-compose.prod.yml up -d
#
# Update to latest version:
#   docker compose -f docker-compose.prod.yml pull && docker compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ghcr.io/benawi1402/homespace-backend:latest
    container_name: homespace-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    volumes:
      - /volume1/docker/homespace/data:/app/data
    networks:
      - homespace
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: ghcr.io/benawi1402/homespace-frontend:latest
    container_name: homespace-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - homespace

networks:
  homespace:
    driver: bridge
